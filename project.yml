name: Wellnario

options:
  bundleIdPrefix: com.wellnario
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "73ZVWQPH3Z"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: false
    ENABLE_USER_SCRIPT_SANDBOXING: true
    CLANG_ENABLE_MODULES: true

targets:
  Wellnario:
    type: application
    platform: iOS
    sources:
      - path: Wellnario
        excludes:
          - Resources
      - path: Wellnario/Resources
        excludes:
          - Info.plist
          - Wellnario.entitlements
        buildPhase: resources
    dependencies:
      - sdk: libsqlite3.tbd
      - sdk: HealthKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dtigl.wellnario.ios
        PRODUCT_NAME: Wellnario
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: false
        CODE_SIGN_ENTITLEMENTS: Wellnario/Resources/Wellnario.entitlements
    info:
      path: Wellnario/Resources/Info.plist
      properties:
        CFBundleDisplayName: Wellnario
        CFBundleDevelopmentRegion: es
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleLocalizations:
          - es
          - en
        NSHealthShareUsageDescription: Wellnario imports your sleep, activity, heart, and workout data after you choose what to share.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIRequiresFullScreen: true
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIViewControllerBasedStatusBarAppearance: true

  WellnarioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WellnarioTests
    dependencies:
      - target: Wellnario
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wellnario.tests
        TARGETED_DEVICE_FAMILY: "1"
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Wellnario.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Wellnario
        BUNDLE_LOADER: $(TEST_HOST)

  WellnarioUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WellnarioUITests
    dependencies:
      - target: Wellnario
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wellnario.uitests
        TARGETED_DEVICE_FAMILY: "1"

schemes:
  Wellnario:
    build:
      targets:
        Wellnario: all
        WellnarioTests: [test]
        WellnarioUITests: [test]
    test:
      targets:
        - WellnarioTests
        - WellnarioUITests
      gatherCoverageData: true
